version: '3.8'

services:
  postgres:
    image: postgres:latest
    container_name: logistica-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ChangeMe123!}
      POSTGRES_DB: logistica_db
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./data/raw:/docker-entrypoint-initdb.d/raw_data:ro
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d logistica_db"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  postgres-data: