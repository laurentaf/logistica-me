version: 2

models:
  - name: stg_raw_logs
    description: "Staging model for raw log data with cleaned types"
    tests:
      - valid_ip_address
      - valid_timestamp_format
      - endpoint_pattern_consistency
      - user_agent_format
    columns:
      - name: log_id
        description: "Unique identifier for each log entry"
        tests:
          - not_null
          - unique
      - name: event_timestamp
        description: "Cleaned event timestamp"
        tests:
          - not_null
      - name: ip_address
        description: "Client IP address"
        tests:
          - not_null
      - name: http_method
        description: "HTTP method"
        tests:
          - accepted_values:
              values: ['GET', 'POST', 'PUT', 'DELETE', 'PATCH', 'HEAD', 'OPTIONS']
      - name: endpoint
        description: "API endpoint path"
        tests:
          - not_null
      - name: status_code
        description: "HTTP status code as integer"
        tests:
          - not_null
          - accepted_values:
              values: [100, 200, 201, 204, 400, 401, 403, 404, 500, 502, 503]
      - name: response_time_ms
        description: "Response time in milliseconds as integer"
        tests:
          - not_null
          - positive_value
      - name: user_agent
        description: "Client user agent string"
        tests:
          - not_null

  - name: fact_log_events
    description: "Fact table with enhanced analytics columns"
    tests:
      - foreign_key_integrity
      - response_time_thresholds
      - consistency_status_response_time
    columns:
      - name: log_id
        description: "Unique identifier for each log entry"
        tests:
          - not_null
          - unique
      - name: event_timestamp
        description: "Event timestamp"
        tests:
          - not_null
      - name: event_date
        description: "Date portion of event timestamp"
        tests:
          - not_null
      - name: event_hour
        description: "Hour portion of event timestamp"
        tests:
          - not_null
      - name: status_category
        description: "Categorized status code (success, client_error, server_error, other)"
        tests:
          - not_null
          - accepted_values:
              values: ['success', 'client_error', 'server_error', 'other']
      - name: response_time_category
        description: "Categorized response time (fast, medium, slow, very_slow)"
        tests:
          - not_null
          - accepted_values:
              values: ['fast', 'medium', 'slow', 'very_slow']

  - name: dim_endpoints
    description: "Dimension table with endpoint statistics"
    tests:
      - endpoint_referential_integrity
    columns:
      - name: endpoint
        description: "API endpoint path"
        tests:
          - not_null
      - name: total_requests
        description: "Total number of requests to this endpoint"
        tests:
          - not_null
      - name: success_rate_pct
        description: "Percentage of successful requests"
        tests:
          - relationships:
              to: ref('stg_raw_logs')
              field: endpoint
      - name: client_error_rate_pct
        description: "Percentage of client errors"
        tests:
          - relationships:
              to: ref('stg_raw_logs')
              field: endpoint
      - name: server_error_rate_pct
        description: "Percentage of server errors"
        tests:
          - relationships:
              to: ref('stg_raw_logs')
              field: endpoint

  - name: dim_time_periods
    description: "Dimension table with hourly aggregated metrics"
    tests:
      - missing_timestamp_ranges
    columns:
      - name: period_start
        description: "Start of hour period"
        tests:
          - not_null
      - name: request_count
        description: "Number of requests in this hour"
        tests:
          - not_null
      - name: success_rate_pct
        description: "Percentage of successful requests in this hour"
        tests:
          - not_null

  - name: test_results
    description: "Consolidated test execution results"
    columns:
      - name: test_category
        description: "Category of test (data_quality, business_logic, etc)"
        tests:
          - not_null
          - accepted_values:
              values: ['data_quality', 'referential_integrity', 'business_logic', 'completeness', 'data_consistency']
      - name: test_name
        description: "Name of the test"
        tests:
          - not_null
      - name: failures
        description: "Number of failures detected"
        tests:
          - not_null
      - name: description
        description: "Test description"
      - name: test_status
        description: "PASS or FAIL"
        tests:
          - not_null
          - accepted_values:
              values: ['PASS', 'FAIL']
      - name: execution_timestamp
        description: "When the test was executed"
        tests:
          - not_null